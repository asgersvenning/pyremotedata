name: Rebuild and Publish to PyPI

on:
  workflow_run:
    workflows: ['Python Unit Tests']
    types: [completed]
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'master' && !contains(github.event.workflow_run.head_commit.message, '[skip ci]') }}

    # 1. Set the environment name to match your PyPI Trusted Publisher config
    environment:
      name: pypi 

    # 2. Grant OIDC permissions for passwordless publishing
    permissions:
      id-token: write   # MANDATORY: Allows uv to authenticate with PyPI
      contents: write   # MANDATORY: Allows the bot to push the version commit
      pages: write      # OPTIONAL: Needed if deploying docs requires token access

    concurrency:
      group: ci-${{ github.event.workflow_run.head_branch }}
      cancel-in-progress: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
        fetch-depth: 0 
    
    - name: Install uv and set up Python
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true
        python-version: '3.10'

    # 3. Use uv's native version bumping (assuming static versioning in pyproject.toml)
    - name: Bump version
      id: bump_version
      run: |
        # Natively bump the patch version (updates pyproject.toml AND uv.lock)
        uv version --bump patch
        
        # Extract the new version to use in the commit message using a quick ephemeral script
        NEW_VERSION=$(uv run --with tomli python -c "import tomli, sys; print(tomli.load(sys.stdin.buffer)['project']['version'])" < pyproject.toml)
        echo "new_version=$NEW_VERSION" >> $GITHUB_ENV

    - name: Commit new version to main branch
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git checkout master
        
        # Commit the native uv updates
        git add pyproject.toml uv.lock
        git commit -m "Bump version to ${{ env.new_version }} and update documentation [skip ci]"
        git push origin master
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build the package
      run: uv build

    # 4. Optional but recommended: Smoke test the built wheel before publishing
    - name: Smoke test (wheel)
      run: uv run --isolated --no-project --with dist/*.whl python -c "import pyremotedata"

    # 5. Publish with ZERO credentials! uv detects the id-token natively.
    - name: Publish to PyPI
      run: uv publish

    - name: Build Sphinx documentation
      run: |
        cd docs
        uv run --with sphinx --with sphinx_immaterial --with sphinx-autodoc-typehints --with .. make -f Makefile html
        cd ..

    - name: Deploy documentation to gh-pages branch
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: docs/_build/html
        commit_message: "Update documentation for version ${{ env.new_version }} [skip ci]"
        force_orphan: true